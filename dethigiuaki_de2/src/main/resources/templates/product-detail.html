<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Cửa Hàng</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Tất cả sản phẩm</a>
                </li>
            </ul>
            <span class="navbar-text me-3" th:text="'Xin chào, ' + ${session.loggedInUser.fullName}"></span>
            <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-5">
            <img th:src="${product.image != null and !product.image.isEmpty() ? product.image : 'https://via.placeholder.com/500'}" class="img-fluid rounded" alt="Product Image">
        </div>
        <div class="col-md-7">
            <h2 th:text="${product.productName}"></h2>
            <p class="text-muted" th:text="'Danh mục: ' + ${product.category.categoryName}"></p>
            <h3 class="text-danger my-3" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></h3>
            
            <p><strong>Số lượng còn:</strong> <span th:text="${product.quantity}"></span></p>
            
            <h5 class="mt-4">Mô tả sản phẩm</h5>
            <p th:text="${product.description}"></p>
            
            <button class="btn btn-success mt-3 btn-lg">Thêm vào giỏ hàng</button>
            <a th:href="@{/}" class="btn btn-outline-secondary mt-3 btn-lg ms-2">Trở lại</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
