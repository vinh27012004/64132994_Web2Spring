<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}"><i class="fa-solid fa-store me-2"></i>Cửa Hàng</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="fa-solid fa-box-open me-1"></i> Tất cả sản phẩm</a>
                </li>
            </ul>
            <span class="navbar-text me-3"><i class="fa-solid fa-user-circle me-1"></i> <span th:text="'Xin chào, ' + ${session.loggedInUser.fullName}"></span></span>
            <a th:href="@{/logout}" class="btn btn-outline-light btn-sm"><i class="fa-solid fa-sign-out-alt me-1"></i> Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="product-detail-wrapper">
        <div class="row">
            <div class="col-md-5">
            <img th:src="${product.image != null and !product.image.isEmpty() ? product.image : 'https://via.placeholder.com/500'}" class="img-fluid rounded" alt="Product Image">
        </div>
        <div class="col-md-7">
            <h2 th:text="${product.productName}"></h2>
            <p class="text-muted" th:text="'Danh mục: ' + ${product.category.categoryName}"></p>
            <h3 class="text-danger my-3" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></h3>
            
            <p><strong>Số lượng còn:</strong> <span th:text="${product.quantity}"></span></p>
            
            <h5 class="mt-4">Mô tả sản phẩm</h5>
            <p th:text="${product.description}"></p>
            
            <button class="btn btn-success mt-3 btn-lg"><i class="fa-solid fa-cart-plus me-2"></i>Thêm vào giỏ hàng</button>
            <a th:href="@{/}" class="btn btn-outline-secondary mt-3 btn-lg ms-2"><i class="fa-solid fa-arrow-left me-2"></i>Trở lại</a>
        </div>
    </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
