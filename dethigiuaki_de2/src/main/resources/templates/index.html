<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Cửa Hàng</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Tất cả sản phẩm</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Thể loại
                    </a>
                    <ul class="dropdown-menu">
                        <li th:each="category : ${category}">
                            <a class="dropdown-item" th:href="@{'/category/' + ${category.categoryId}}" th:text="${category.categoryName}"></a>
                        </li>
                    </ul>
                </li>
            </ul>
            <span class="navbar-text me-3" th:text="'Xin chào, ' + ${session.loggedInUser.fullName}"></span>
            <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Tất Cả Sản Phẩm</h2>
    <div class="row row-cols-1 row-cols-md-4 g-4">
        <div class="col" th:each="product : ${products}">
            <div class="card h-100">
                <img th:src="${product.image != null and !product.image.isEmpty() ? product.image : 'https://via.placeholder.com/300'}" class="card-img-top" alt="Product Image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.productName}"></h5>
                    <p class="card-text text-danger fw-bold" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></p>
                    <a th:href="@{'/product/' + ${product.productId}}" class="btn btn-primary">Chi Tiết</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
