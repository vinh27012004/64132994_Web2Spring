<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex align-items-center min-vh-100 py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="login-card">
                <div class="card-header text-white text-center">
                    <h4><i class="fa-solid fa-lock me-2"></i>Đăng Nhập</h4>
                </div>
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-4">
                            <label for="username" class="form-label"><i class="fa-solid fa-user me-2"></i>Tên đăng nhập</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Nhập tên đăng nhập..." required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label"><i class="fa-solid fa-key me-2"></i>Mật khẩu</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Nhập mật khẩu..." required>
                        </div>
                        <div class="d-grid gap-2 mt-5">
                            <button type="submit" class="btn btn-primary btn-lg"><i class="fa-solid fa-right-to-bracket me-2"></i>Đăng Nhập</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
