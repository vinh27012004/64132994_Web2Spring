<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Loại tin tức</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="admin-wrapper">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
        <a class="sidebar-brand" href="/admin">
            <i class="bi bi-shield-lock me-2"></i>NTU <span>Admin</span>
        </a>
        <div class="nav-section">Tổng quan</div>
        <nav class="nav flex-column">
            <div class="nav-item">
                <a class="nav-link" href="/admin"><i class="bi bi-speedometer2"></i>Dashboard</a>
            </div>
        </nav>
        <div class="nav-section">Quản lý</div>
        <nav class="nav flex-column">
            <div class="nav-item">
                <a class="nav-link active" href="/admin/loaitintuc">
                    <i class="bi bi-tags"></i>Loại tin tức
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link" href="/admin/tintuc"><i class="bi bi-newspaper"></i>Tin tức</a>
            </div>
        </nav>
        <div class="nav-section">Hệ thống</div>
        <nav class="nav flex-column">
            <div class="nav-item">
                <a class="nav-link" href="/"><i class="bi bi-box-arrow-left"></i>Về trang chủ</a>
            </div>
        </nav>
    </aside>

    <!-- CONTENT -->
    <div class="admin-content">
        <div class="admin-topbar">
            <span class="page-title">
                <i class="bi bi-tag me-2 text-primary"></i>
                <span th:text="${loaiTinTuc.id == null} ? 'Thêm loại tin tức mới' : 'Sửa loại tin tức'"></span>
            </span>
            <a href="/admin/loaitintuc" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Quay lại
            </a>
        </div>

        <div class="admin-main">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card form-card shadow">
                        <div class="card-header">
                            <h5>
                                <i th:class="${loaiTinTuc.id == null} ? 'bi bi-plus-circle me-2' : 'bi bi-pencil-square me-2'"></i>
                                <span th:text="${loaiTinTuc.id == null} ? 'Thêm loại tin tức mới' : 'Cập nhật loại tin tức'"></span>
                            </h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/admin/loaitintuc/luu}" method="post" th:object="${loaiTinTuc}">
                                <input type="hidden" th:field="*{id}">

                                <div class="mb-4">
                                    <label class="form-label">
                                        <i class="bi bi-tag me-1 text-primary"></i>
                                        Tên loại <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" th:field="*{tenLoai}"
                                           placeholder="VD: Thể thao, Kinh tế, Công nghệ..." required>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">
                                        <i class="bi bi-card-text me-1 text-primary"></i>Mô tả
                                    </label>
                                    <textarea class="form-control" th:field="*{moTa}" rows="3"
                                              placeholder="Mô tả ngắn về loại tin tức này..."></textarea>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-lg me-1"></i>Lưu
                                    </button>
                                    <a href="/admin/loaitintuc" class="btn btn-outline-secondary">
                                        <i class="bi bi-x-lg me-1"></i>Hủy
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
