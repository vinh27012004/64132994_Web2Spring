<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Loại tin tức</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="admin-wrapper">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
        <a class="sidebar-brand" href="/admin">
            <i class="bi bi-shield-lock me-2"></i>NTU <span>Admin</span>
        </a>
        <div class="nav-section">Tổng quan</div>
        <nav class="nav flex-column">
            <div class="nav-item">
                <a class="nav-link" href="/admin"><i class="bi bi-speedometer2"></i>Dashboard</a>
            </div>
        </nav>
        <div class="nav-section">Quản lý</div>
        <nav class="nav flex-column">
            <div class="nav-item">
                <a class="nav-link active" href="/admin/loaitintuc">
                    <i class="bi bi-tags"></i>Loại tin tức
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link" href="/admin/tintuc"><i class="bi bi-newspaper"></i>Tin tức</a>
            </div>
        </nav>
        <div class="nav-section">Hệ thống</div>
        <nav class="nav flex-column">
            <div class="nav-item">
                <a class="nav-link" href="/"><i class="bi bi-box-arrow-left"></i>Về trang chủ</a>
            </div>
        </nav>
    </aside>

    <!-- CONTENT -->
    <div class="admin-content">
        <div class="admin-topbar">
            <span class="page-title"><i class="bi bi-tags me-2 text-primary"></i>Loại tin tức</span>
            <a href="/" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-box-arrow-up-right me-1"></i>Xem trang chủ
            </a>
        </div>

        <div class="admin-main">
            <div class="admin-table-wrapper">
                <div class="table-toolbar">
                    <h6><i class="bi bi-list-ul me-2"></i>Danh sách loại tin tức</h6>
                    <a href="/admin/loaitintuc/them" class="btn btn-primary btn-sm">
                        <i class="bi bi-plus-lg me-1"></i>Thêm mới
                    </a>
                </div>

                <div th:if="${#lists.isEmpty(danhSachLoai)}" class="p-4">
                    <div class="alert alert-info mb-0">
                        <i class="bi bi-info-circle me-2"></i>Chưa có loại tin tức nào.
                        <a href="/admin/loaitintuc/them" class="alert-link">Thêm ngay →</a>
                    </div>
                </div>

                <table class="table admin-table mb-0" th:if="${!#lists.isEmpty(danhSachLoai)}">
                    <thead>
                        <tr>
                            <th style="width:60px">#</th>
                            <th>Tên loại</th>
                            <th>Mô tả</th>
                            <th style="width:160px">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="loai, stat : ${danhSachLoai}">
                            <td>
                                <span class="badge bg-light text-dark fw-bold" th:text="${stat.count}"></span>
                            </td>
                            <td>
                                <span class="badge-category" th:text="${loai.tenLoai}"></span>
                            </td>
                            <td class="text-muted" th:text="${loai.moTa}"></td>
                            <td>
                                <a th:href="@{/admin/loaitintuc/sua/{id}(id=${loai.id})}"
                                   class="btn btn-warning btn-sm me-1">
                                    <i class="bi bi-pencil me-1"></i>Sửa
                                </a>
                                <a th:href="@{/admin/loaitintuc/xoa/{id}(id=${loai.id})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Xóa loại này sẽ xóa tất cả tin thuộc loại. Tiếp tục?')">
                                    <i class="bi bi-trash me-1"></i>Xóa
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
