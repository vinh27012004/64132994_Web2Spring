<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tin tức</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="admin-wrapper">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
        <a class="sidebar-brand" href="/admin">
            <i class="bi bi-shield-lock me-2"></i>NTU <span>Admin</span>
        </a>
        <div class="nav-section">Tổng quan</div>
        <nav class="nav flex-column">
            <div class="nav-item">
                <a class="nav-link" href="/admin"><i class="bi bi-speedometer2"></i>Dashboard</a>
            </div>
        </nav>
        <div class="nav-section">Quản lý</div>
        <nav class="nav flex-column">
            <div class="nav-item">
                <a class="nav-link" href="/admin/loaitintuc"><i class="bi bi-tags"></i>Loại tin tức</a>
            </div>
            <div class="nav-item">
                <a class="nav-link active" href="/admin/tintuc">
                    <i class="bi bi-newspaper"></i>Tin tức
                </a>
            </div>
        </nav>
        <div class="nav-section">Hệ thống</div>
        <nav class="nav flex-column">
            <div class="nav-item">
                <a class="nav-link" href="/"><i class="bi bi-box-arrow-left"></i>Về trang chủ</a>
            </div>
        </nav>
    </aside>

    <!-- CONTENT -->
    <div class="admin-content">
        <div class="admin-topbar">
            <span class="page-title">
                <i class="bi bi-newspaper me-2 text-primary"></i>
                <span th:text="${tinTuc.id == null} ? 'Thêm tin tức mới' : 'Sửa tin tức'"></span>
            </span>
            <a href="/admin/tintuc" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Quay lại
            </a>
        </div>

        <div class="admin-main">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card form-card shadow">
                        <div class="card-header">
                            <h5>
                                <i th:class="${tinTuc.id == null} ? 'bi bi-plus-circle me-2' : 'bi bi-pencil-square me-2'"></i>
                                <span th:text="${tinTuc.id == null} ? 'Thêm tin tức mới' : 'Cập nhật tin tức'"></span>
                            </h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/admin/tintuc/luu}" method="post" th:object="${tinTuc}">
                                <input type="hidden" th:field="*{id}">

                                <div class="mb-4">
                                    <label class="form-label">
                                        <i class="bi bi-type-h1 me-1 text-primary"></i>
                                        Tiêu đề <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control form-control-lg" th:field="*{tieuDe}"
                                           placeholder="Nhập tiêu đề bài viết..." required>
                                </div>

                                <div class="row g-3 mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label">
                                            <i class="bi bi-tag me-1 text-primary"></i>Loại tin tức
                                        </label>
                                        <select class="form-select" name="loaiId">
                                            <option value="">-- Chọn loại --</option>
                                            <option th:each="loai : ${danhSachLoai}"
                                                    th:value="${loai.id}"
                                                    th:text="${loai.tenLoai}"
                                                    th:selected="${tinTuc.loaiTinTuc != null and tinTuc.loaiTinTuc.id == loai.id}">
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">
                                            <i class="bi bi-image me-1 text-primary"></i>Hình ảnh (URL)
                                        </label>
                                        <input type="text" class="form-control" th:field="*{hinhAnh}"
                                               placeholder="https://example.com/image.jpg">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">
                                        <i class="bi bi-card-text me-1 text-primary"></i>Tóm tắt
                                    </label>
                                    <textarea class="form-control" th:field="*{tomTat}" rows="2"
                                              placeholder="Mô tả ngắn về bài viết (hiển thị ở trang danh sách)..."></textarea>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">
                                        <i class="bi bi-file-text me-1 text-primary"></i>Nội dung
                                    </label>
                                    <textarea class="form-control" th:field="*{noiDung}" rows="12"
                                              placeholder="Nội dung đầy đủ của bài viết..."></textarea>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary px-4">
                                        <i class="bi bi-check-lg me-2"></i>Lưu bài viết
                                    </button>
                                    <a href="/admin/tintuc" class="btn btn-outline-secondary px-4">
                                        <i class="bi bi-x-lg me-2"></i>Hủy
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
