<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tinTuc.tieuDe}">Chi tiết tin tức</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg main-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">Tin Tức <span class="accent">NTU</span></a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link" href="/tintuc">Tin tức</a></li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin" style="color: #e94560 !important;">Admin</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4 mb-5">
    <div class="row g-4">

        <!-- MAIN ARTICLE -->
        <div class="col-lg-8">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a href="/tintuc">Tin tức</a></li>
                    <li class="breadcrumb-item active" th:text="${tinTuc.tieuDe}"></li>
                </ol>
            </nav>

            <div class="card shadow-sm p-0">
                <!-- Hero image -->
                <img th:src="${tinTuc.hinhAnh}" class="img-fluid w-100"
                     style="max-height:420px; object-fit:cover; border-radius:12px 12px 0 0;"
                     th:if="${tinTuc.hinhAnh != null and !#strings.isEmpty(tinTuc.hinhAnh)}" alt="Hình">

                <div class="card-body p-4">
                    <!-- Category badge -->
                    <span class="badge-category mb-3 d-inline-block"
                          th:text="${tinTuc.loaiTinTuc != null ? tinTuc.loaiTinTuc.tenLoai : 'Chưa phân loại'}"></span>

                    <!-- Title -->
                    <div class="article-header">
                        <h1 th:text="${tinTuc.tieuDe}"></h1>
                    </div>

                    <!-- Meta -->
                    <div class="article-meta mt-2 mb-4">
                        <span>
                            <i class="bi bi-calendar3"></i>
                            <span th:text="${tinTuc.ngayDang != null ? #temporals.format(tinTuc.ngayDang, 'dd/MM/yyyy HH:mm') : ''}"></span>
                        </span>
                        <span th:if="${tinTuc.loaiTinTuc != null}">
                            <i class="bi bi-tag"></i>
                            <span th:text="${tinTuc.loaiTinTuc.tenLoai}"></span>
                        </span>
                    </div>

                    <!-- Summary -->
                    <p class="lead text-muted border-start border-danger border-3 ps-3 mb-4"
                       th:if="${tinTuc.tomTat != null and !#strings.isEmpty(tinTuc.tomTat)}"
                       th:text="${tinTuc.tomTat}"></p>

                    <!-- Content -->
                    <div class="article-content" th:utext="${tinTuc.noiDung}"></div>
                </div>

                <div class="card-footer bg-transparent border-top px-4 py-3">
                    <a href="/tintuc" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Quay lại danh sách
                    </a>
                </div>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="col-lg-4">
            <div class="sidebar-widget card shadow-sm">
                <div class="widget-header"><i class="bi bi-tags me-2"></i>Danh Mục</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item">
                        <a href="/tintuc">
                            <i class="bi bi-grid-3x3-gap text-primary"></i>Tất cả tin tức
                        </a>
                    </li>
                    <li class="list-group-item" th:each="loai : ${danhSachLoai}">
                        <a th:href="@{/tintuc(loaiId=${loai.id})}">
                            <i class="bi bi-chevron-right text-danger"></i>
                            <span th:text="${loai.tenLoai}"></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="main-footer">
    <div class="container">
        <div class="footer-brand">Tin Tức <span>NTU</span></div>
        <hr>
        <small>&copy; 2024 NTU CMS</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
