<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách tin tức</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg main-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">Tin Tức <span class="accent">NTU</span></a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link" href="/tintuc">Tất cả tin</a></li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin" style="color: #e94560 !important;">Admin</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- PAGE HEADER -->
<div style="background: linear-gradient(135deg, #1a1a2e, #0f3460); padding: 30px 0; color:white;">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1">
                <li class="breadcrumb-item"><a href="/" style="color:rgba(255,255,255,0.7);">Trang chủ</a></li>
                <li class="breadcrumb-item active" style="color:white;">Tin tức</li>
            </ol>
        </nav>
        <h4 class="mb-0 fw-bold" th:if="${loaiHienTai != null}">
            <i class="bi bi-tag me-2"></i><span th:text="${loaiHienTai.tenLoai}"></span>
        </h4>
        <h4 class="mb-0 fw-bold" th:if="${loaiHienTai == null}">
            <i class="bi bi-newspaper me-2"></i>Tất cả tin tức
        </h4>
    </div>
</div>

<!-- CONTENT -->
<div class="container mt-4 mb-5">
    <div class="row g-4">

        <!-- MAIN -->
        <div class="col-lg-8">
            <div th:if="${#lists.isEmpty(danhSachTinTuc)}" class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i>Không có tin tức nào trong danh mục này.
            </div>

            <div class="card news-card mb-4" th:each="tin : ${danhSachTinTuc}">
                <div class="row g-0">
                    <div class="col-md-4" th:if="${tin.hinhAnh != null and !#strings.isEmpty(tin.hinhAnh)}">
                        <img th:src="${tin.hinhAnh}" class="img-fluid rounded-start"
                             style="height:160px; width:100%; object-fit:cover;" alt="Hình">
                    </div>
                    <div th:class="${tin.hinhAnh != null and !#strings.isEmpty(tin.hinhAnh)} ? 'col-md-8' : 'col-12'">
                        <div class="card-body py-3">
                            <span class="badge-category mb-2 d-inline-block"
                                  th:text="${tin.loaiTinTuc != null ? tin.loaiTinTuc.tenLoai : 'Chưa phân loại'}"></span>
                            <h5 class="card-title" th:text="${tin.tieuDe}"></h5>
                            <p class="card-text" th:text="${tin.tomTat}"></p>
                            <div class="d-flex justify-content-between align-items-center mt-2">
                                <small class="text-muted">
                                    <i class="bi bi-clock me-1"></i>
                                    <span th:text="${tin.ngayDang != null ? #temporals.format(tin.ngayDang, 'dd/MM/yyyy HH:mm') : ''}"></span>
                                </small>
                                <a th:href="@{/tintuc/{id}(id=${tin.id})}"
                                   class="btn btn-sm btn-primary">Xem chi tiết <i class="bi bi-arrow-right ms-1"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="col-lg-4">
            <div class="sidebar-widget card shadow-sm">
                <div class="widget-header"><i class="bi bi-tags me-2"></i>Danh Mục</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item">
                        <a href="/tintuc">
                            <i class="bi bi-grid-3x3-gap text-primary"></i>Tất cả tin tức
                        </a>
                    </li>
                    <li class="list-group-item" th:each="loai : ${danhSachLoai}">
                        <a th:href="@{/tintuc(loaiId=${loai.id})}">
                            <i class="bi bi-chevron-right text-danger"></i>
                            <span th:text="${loai.tenLoai}"></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="main-footer">
    <div class="container">
        <div class="footer-brand">Tin Tức <span>NTU</span></div>
        <hr>
        <small>&copy; 2024 NTU CMS</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
