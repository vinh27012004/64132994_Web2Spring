<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 420px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">Dang nhap</h3>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input class="form-control" type="text" name="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" name="password" required>
                </div>

                <div th:if="${param.error}" class="alert alert-danger py-2">
                    Sai username hoac password.
                </div>
                <div th:if="${param.logout}" class="alert alert-info py-2">
                    Ban da dang xuat.
                </div>
                <div th:if="${param.registered}" class="alert alert-success py-2">
                    Dang ky thanh cong, hay dang nhap.
                </div>

                <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>

            <p class="text-center mt-3 mb-0">
                Chua co tai khoan?
                <a th:href="@{/register}">Dang ky</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
