<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<div class="container py-5">
    <div class="p-4 p-md-5 mb-4 bg-white rounded-3 shadow-sm">
        <h1 class="display-6">Spring Security + JPA Demo</h1>
        <p class="lead mb-3">Ban da dang nhap voi tai khoan: <strong th:text="${username ?: 'guest'}"></strong></p>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-primary" href="/admin">Thu trang Admin</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-danger" type="submit">Logout</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
