<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 460px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">Dang ky tai khoan</h3>
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input class="form-control" th:field="*{username}" type="text" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" th:field="*{password}" type="password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input class="form-control" th:field="*{confirmPassword}" type="password" required>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

                <button class="btn btn-success w-100" type="submit">Register</button>
            </form>
            <p class="text-center mt-3 mb-0">
                Da co tai khoan?
                <a th:href="@{/login}">Dang nhap</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
