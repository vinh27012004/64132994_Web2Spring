<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post View</title>
    <style>
        :root {
            --line: #d3dde7;
            --text: #1f2a37;
            --bg: #f7faff;
            --accent: #1f6feb;
        }

        body {
            margin: 0;
            padding: 18px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        h1 {
            margin: 0 0 14px 0;
            font-size: 24px;
        }

        .card {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 16px;
            max-width: 760px;
        }

        .row {
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .actions {
            margin-top: 14px;
            display: flex;
            gap: 14px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>Chi tiet Post</h1>
    <div class="card">
        <p class="row"><strong>Id:</strong> <span th:text="${post.id}">1</span></p>
        <p class="row"><strong>Title:</strong> <span th:text="${post.title}">Bai viet 1</span></p>
        <p class="row"><strong>Category Id:</strong> <span th:text="${post.categoryId}">101</span></p>
        <p class="row"><strong>Content:</strong> <span th:text="${post.content}">Noi dung bai viet</span></p>
    </div>

    <div class="actions">
        <a th:href="@{/post/all}" href="/post/all">Quay lai danh sach Post</a>
        <a th:href="@{/dashboard}" href="/dashboard">Quay lai Dashboard</a>
    </div>
</body>
</html>
