<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Add New</title>
</head>
<body>
    <h1>Them Page Moi</h1>
    <form th:action="@{/page/new}" action="/page/new" method="post">
        <p>
            <label for="pageName">Page Name:</label>
            <input id="pageName" name="pageName" type="text" required>
        </p>
        <p>
            <label for="keyword">Keyword:</label>
            <input id="keyword" name="keyword" type="text">
        </p>
        <p>
            <label for="parentPageId">Parent Page Id:</label>
            <input id="parentPageId" name="parentPageId" type="number" value="0">
        </p>
        <p>
            <label for="content">Content:</label>
            <textarea id="content" name="content" rows="4" cols="40"></textarea>
        </p>
        <p>
            <button type="submit">Luu</button>
        </p>
    </form>
    <p><a th:href="@{/page/all}" href="/page/all">Xem danh sach Page</a></p>
    <p><a th:href="@{/dashboard}" href="/dashboard">Quay lai Dashboard</a></p>
</body>
</html>
