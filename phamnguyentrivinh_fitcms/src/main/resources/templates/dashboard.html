<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Dashboard</title>
    <style>
        :root {
            --bg: #eef3f7;
            --line: #d0dae3;
            --panel: #ffffff;
            --text: #1f2a37;
            --muted: #6b7b8c;
            --menu-hover: #f0f6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 14px;
        }

        .frame {
            border: 1px solid var(--line);
            border-radius: 12px;
            min-height: calc(100vh - 28px);
            display: flex;
            flex-direction: column;
            background: var(--panel);
            overflow: hidden;
        }

        .topbar {
            height: 74px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fbff;
        }

        .logo-wrap {
            width: 210px;
            height: 100%;
            border-right: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .logo {
            max-width: 100%;
            max-height: 52px;
            display: block;
        }

        .user {
            padding: 0 18px;
            font-size: 20px;
            font-weight: 600;
            color: var(--muted);
        }

        .main {
            display: flex;
            flex: 1;
        }

        .sidebar {
            width: 210px;
            border-right: 1px solid var(--line);
            padding: 10px;
            background: #f8fbff;
        }

        .brand {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #23384d;
        }

        .menu {
            list-style: none;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            overflow: hidden;
        }

        .menu li {
            border-bottom: 1px solid var(--line);
        }

        .menu li:last-child {
            border-bottom: none;
        }

        .menu a {
            display: block;
            text-decoration: none;
            color: var(--text);
            padding: 10px 12px;
            font-size: 18px;
            transition: background 0.2s ease;
        }

        .menu a:hover {
            background: var(--menu-hover);
        }

        .content {
            flex: 1;
            padding: 12px;
            background: #fbfdff;
        }

        .content-frame {
            width: 100%;
            height: 100%;
            min-height: 460px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--panel);
        }

        .footer {
            border-top: 1px solid var(--line);
            text-align: center;
            padding: 10px 8px;
            font-size: 16px;
            background: #f8fbff;
            color: var(--muted);
        }


        @media (max-width: 768px) {
            .main {
                flex-direction: column;
            }

            .logo-wrap,
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--line);
            }

            .topbar {
                height: auto;
                flex-direction: column;
            }

            .user {
                width: 100%;
                text-align: right;
                font-size: 18px;
                padding: 10px 14px;
            }

            .menu a,
            .brand,
            .content {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="frame">
        <header class="topbar">
            <div class="logo-wrap">
                <img class="logo" th:src="@{/image/Screenshot 2026-03-11 151124.png}" src="/image/Screenshot%202026-03-11%20151124.png" alt="Logo khoa CNTT NTU">
            </div>
            <div class="user">[PhamNguyenTriVinh]</div>
        </header>

        <div class="main">
            <aside class="sidebar">
                <div class="brand">Dashboard</div>
                <ul class="menu">
                    <li><a th:href="@{/page/all}" href="/page/all" target="contentFrame">Page -List</a></li>
                    <li><a th:href="@{/page/new}" href="/page/new" target="contentFrame">Page -Addnew</a></li>
                    <li><a th:href="@{/post/all}" href="/post/all" target="contentFrame">Post -List</a></li>
                    <li><a th:href="@{/post/new}" href="/post/new" target="contentFrame">Post -Addnew</a></li>
                </ul>
            </aside>

            <main class="content">
                <iframe class="content-frame" name="contentFrame" th:src="@{/page/all}" src="/page/all" title="Content"></iframe>
            </main>
        </div>

        <footer class="footer">&copy;2025 by PhamNguyenTriVinh - FIT.NTU</footer>
    </div>
</body>
</html>
