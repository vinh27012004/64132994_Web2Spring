<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Ví dụ Hello Spring Boot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #f8fafc);
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
        }
        .card {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            width: min(500px, 90vw);
        }
        h1 {
            color: #0f172a;
            margin-bottom: 12px;
        }
        p {
            color: #334155;
            line-height: 1.6;
        }
        form {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="${message}">Xin chào, Spring Boot!</h1>
    <p th:text="${description}">Ứng dụng Spring Boot đầu tiên dùng Controller + Thymeleaf.</p>

    <form action="/hello" method="get">
        <input type="text" name="name" placeholder="Nhập tên của bạn">
        <button type="submit">Gửi</button>
    </form>
</div>
</body>
</html>
